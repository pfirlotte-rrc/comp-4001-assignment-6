## Secret Management
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  secret-key: c3VwZXJzZWNyZXRrZXk=

---
apiVersion: apps/v1

kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend

## Pod Template
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: Never
        ports:
          - containerPort: 5000
            name: http

## Environment Variables
        env:
          - name: MONGO_URI
            value: "mongodb://mongo:27017/bank_app"
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: backend-secret
                key: secret-key

## Health Probes
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10

## Resource Management
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

  