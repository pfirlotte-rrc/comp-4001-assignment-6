apiVersion: apps/v1

kind: StatefullSet
metadata:
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:4.4.18
        args:  ["--bind_ip_all"]
        ports:
        - containerPort: 27017
        name: mongo
    livenessProbe:
      tcpSocket:
        port: 27017
      initialDelaySeconds: 20
      periodSeconds: 10
    readinessProbe:
      tcpSocket:
        port: 27017
      initialDelaySeconds: 10
      periodSeconds: 5
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: 1Gi"
      volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplate:
    - metadata:
        name: mongo-data
      spec:
        accessMode:
        - ReadWriteOnce
        resources:
          requests:
          storage: 2Gi