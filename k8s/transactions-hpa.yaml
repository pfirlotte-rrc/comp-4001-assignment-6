apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

## Metadata
metadata:
  name: transactions-hpa

## Specification 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployement
    name: transactions
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
